# mkdocs.yml
site_name: NEXA Documentation
site_description: Semantic workflow engine for modular computational pipelines
site_author: NEXA Contributors
site_url: https://daimoners.github.io/nexa/

repo_name: daimoners/nexa
repo_url: https://github.com/daimoners/nexa

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Concepts:
    - Workflows: concepts/workflows.md
    - Modules: concepts/modules.md
    - Semantic Matching: concepts/semantic-matching.md
  - Execution:
    - Backends: execution/backends.md
    - Nextflow: execution/nextflow.md
  - Visualization: visualization.md
